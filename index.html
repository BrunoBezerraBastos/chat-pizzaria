<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>QueroPizza 🍕</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  margin:0;
}

/* TOPO */
.topo{
  display:flex;
  align-items:center;
  gap:10px;
  background:#d32f2f;
  color:white;
  padding:10px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:50%;
}

.status{
  font-size:12px;
}

/* CHAT */
#mensagens{
  padding:10px;
  margin-bottom:140px;
}

.msg{
  background:white;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  max-width:80%;
}

.bot{ background:#e1ffc7; }
.user{
  background:#d1e7ff;
  margin-left:auto;
}

/* BOTÕES */
.botoes{
  margin-top:5px;
}

.botoes button{
  margin:3px;
  padding:8px;
  border:none;
  border-radius:5px;
  background:#d32f2f;
  color:white;
  cursor:pointer;
}

/* CARRINHO */
.carrinho{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  border-top:2px solid #ccc;
  padding:10px;
}
</style>
</head>

<body>

<div class="topo">
  <img src="logo.png" class="logo">
  <div>
    <b>QueroPizza 🍕</b><br>
    <span id="status">🟢 Online</span>
  </div>
</div>

<div id="mensagens"></div>
<div class="carrinho" id="carrinho"></div>

<script>

let etapa = 0;

let pedido = {
  pizzas:[],
  bebida:"",
  total:0,
  qtd:0,
  contador:1
};

/* MENSAGEM */
function msgBot(texto, botoes=[]){

let div = document.createElement("div");
div.className="msg bot";

let html = texto;

if(botoes.length){
  html += "<div class='botoes'>";
  botoes.forEach(b=>{
    html += `<button onclick="${b.onclick}">${b.texto}</button>`;
  });
  html += "</div>";
}

div.innerHTML = html;
document.getElementById("mensagens").appendChild(div);
scroll();
}

/* USER */
function msgUser(texto){
let div = document.createElement("div");
div.className="msg user";
div.innerHTML = texto;
document.getElementById("mensagens").appendChild(div);
scroll();
}

/* SCROLL */
function scroll(){
window.scrollTo(0,document.body.scrollHeight);
}

/* DIGITANDO */
function digitando(callback){
let s = document.getElementById("status");
s.innerHTML="⌨️ Digitando...";
setTimeout(()=>{
  s.innerHTML="🟢 Online";
  callback();
},1200);
}

/* CARRINHO */
function atualizarCarrinho(){

let html="<b>🧾 Pedido:</b><br>";

pedido.pizzas.forEach((p,i)=>{
  html+=`🍕 ${p}<br>`;
});

if(pedido.bebida){
  html+=`🥤 ${pedido.bebida}<br>`;
}

html+=`<br><b>Total: R$ ${pedido.total}</b>`;

document.getElementById("carrinho").innerHTML=html;
}

/* INÍCIO */
window.onload = ()=>{
digitando(()=>{
  msgBot("Olá! 👋 Bem-vindo! Quantas pizzas você quer?",[
    {texto:"1 pizza", onclick:"qtdPizza(1)"},
    {texto:"2 pizzas", onclick:"qtdPizza(2)"},
    {texto:"3 pizzas", onclick:"qtdPizza(3)"}
  ]);
});
};

/* QUANTIDADE */
function qtdPizza(qtd){
msgUser(qtd+" pizza(s)");
pedido.qtd=qtd;
pedido.contador=1;

digitando(()=>{
  escolherSabor();
});
}

/* SABORES */
function escolherSabor(){

msgBot(`Escolha o sabor da pizza ${pedido.contador}`,[
  {texto:"Calabresa", onclick:"addSabor('Calabresa')"},
  {texto:"Frango", onclick:"addSabor('Frango')"},
  {texto:"Portuguesa", onclick:"addSabor('Portuguesa')"},
  {texto:"Mussarela", onclick:"addSabor('Mussarela')"}
]);

}

/* ADD SABOR */
function addSabor(sabor){

msgUser(sabor);
pedido.pizzas.push(sabor);
pedido.total+=30;

atualizarCarrinho();

if(pedido.contador < pedido.qtd){
  pedido.contador++;
  digitando(()=> escolherSabor());
}else{
  digitando(()=> escolherBebida());
}

}

/* BEBIDA */
function escolherBebida(){

msgBot("Deseja bebida?",[
  {texto:"Coca-Cola", onclick:"addBebida('Coca-Cola')"},
  {texto:"Guaraná", onclick:"addBebida('Guaraná')"},
  {texto:"Não quero", onclick:"finalizar()"}
]);

}

function addBebida(b){
msgUser(b);
pedido.bebida=b;
pedido.total+=8;

atualizarCarrinho();

finalizar();
}

/* FINAL */
function finalizar(){

digitando(()=>{
  msgBot(`Confirmar pedido?<br><br>Total: R$ ${pedido.total}`,[
    {texto:"Confirmar ✅", onclick:"enviarWhats()"}
  ]);
});

}

function enviarWhats(){

let msg="Pedido:%0A";

pedido.pizzas.forEach((p,i)=>{
  msg+=`Pizza ${i+1}: ${p}%0A`;
});

if(pedido.bebida){
  msg+=`Bebida: ${pedido.bebida}%0A`;
}

msg+=`Total: R$ ${pedido.total}`;

window.open(`https://wa.me/5588999999999?text=${msg}`);
}

</script>

</body>
</html>

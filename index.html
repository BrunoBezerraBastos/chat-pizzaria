<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QueroPizza</title>

<style>

html, body{
height:100%;
margin:0;
font-family:Arial;
background:#fff3cd;
}

#chat{
max-width:600px;
margin:auto;
background:white;
height:100vh;
display:flex;
flex-direction:column;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
overflow:hidden;
}

#mensagens{
flex:1;
padding:15px;
overflow-y:auto;
}

.msg{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:80%;
}

.bot{
background:#f1f1f1;
}

.user{
background:#25D366;
color:white;
margin-left:auto;
}

#inputArea{
display:flex;
border-top:1px solid #ccc;
}

#inputUser{
flex:1;
padding:10px;
border:none;
font-size:16px;
}

button{
padding:10px;
background:#25D366;
color:white;
border:none;
cursor:pointer;
}

.opcoes button{
display:block;
margin-top:5px;
width:100%;
background:#eee;
color:black;
}

.typing{
font-style:italic;
opacity:0.6;
}

.msg img{
object-fit:cover;
}

</style>
</head>

<body>

<div id="chat">

<div id="mensagens"></div>

<div id="inputArea">
<input type="text" id="inputUser" placeholder="Digite algo..." onkeypress="if(event.key==='Enter'){responder()}">
<button onclick="responder()">Enviar</button>
</div>

</div>

<script>

let etapa = 0;

let pedido = {
nome:"",
endereco:"",
quantidade:1,
sabores:[],
refri:"",
pagamento:"",
troco:"",
total:0
};

let pizzaAtual = 1;
let saborAtual = 1;

const precoPizza = 24.90;

function delayTempo(texto){
return 800 + (texto.length * 20);
}

function botDigitando(callback, texto){
let typing = document.createElement("div");
typing.className = "msg bot typing";
typing.innerText = "digitando...";
document.getElementById("mensagens").appendChild(typing);
scroll();

setTimeout(()=>{
typing.remove();
callback();
}, delayTempo(texto));
}

// 🔥 MENSAGEM COM FOTO (LOGO)
function addMsgComFoto(texto){
let div = document.createElement("div");
div.className = "msg bot";

div.innerHTML = `
<div style="display:flex; align-items:flex-start; gap:10px;">
<img src="logo.png" style="width:40px; height:40px; border-radius:50%;">
<div>
<b>QueroPizza 🍕</b><br>
${texto}
</div>
</div>
`;

document.getElementById("mensagens").appendChild(div);
scroll();
}

function addMsg(texto, tipo="bot"){
let div = document.createElement("div");
div.className = "msg "+tipo;
div.innerHTML = texto;
document.getElementById("mensagens").appendChild(div);
scroll();
}

function addOpcoes(lista){
let div = document.createElement("div");
div.className="opcoes";

lista.forEach(op=>{
let btn = document.createElement("button");
btn.innerText = op;
btn.onclick = ()=>selecionar(op);
div.appendChild(btn);
});

document.getElementById("mensagens").appendChild(div);
scroll();
}

function scroll(){
let m = document.getElementById("mensagens");
m.scrollTop = m.scrollHeight;
}

function responder(){
let input = document.getElementById("inputUser");
let texto = input.value;

if(texto==="") return;

addMsg(texto,"user");
input.value="";

fluxo(texto);
}

function selecionar(valor){
addMsg(valor,"user");
fluxo(valor);
}

function fluxo(resposta){

if(etapa===1){
pedido.nome = resposta;
botDigitando(()=>{
addMsgComFoto("Qual seu endereço?");
}, "endereco");
etapa=2;
return;
}

if(etapa===2){
pedido.endereco = resposta;
botDigitando(()=>{
addMsgComFoto("Quantas pizzas?");
addOpcoes(["1","2","3","4"]);
}, "quantidade");
etapa=3;
return;
}

if(etapa===3){
pedido.quantidade = parseInt(resposta);
pedido.sabores = [];
pizzaAtual = 1;
saborAtual = 1;

botDigitando(()=>{
addMsgComFoto("Escolha o sabor 1 da pizza "+pizzaAtual+":");
addOpcoes(listaSabores());
}, "sabores");

etapa=4;
return;
}

if(etapa===4){

pedido.sabores.push({
pizza:pizzaAtual,
sabor:resposta
});

if(saborAtual===1){
saborAtual=2;
botDigitando(()=>{
addMsgComFoto("Escolha o sabor 2 da pizza "+pizzaAtual+":");
addOpcoes(listaSabores());
}, "sabores");
return;
}

saborAtual=1;

if(pizzaAtual < pedido.quantidade){
pizzaAtual++;
botDigitando(()=>{
addMsgComFoto("Agora vamos para a pizza "+pizzaAtual+" 🍕<br>Escolha o sabor 1:");
addOpcoes(listaSabores());
}, "proxima pizza");
return;
}

botDigitando(()=>{
addMsgComFoto("Deseja refrigerante?");
addOpcoes(["Sem refrigerante","1L - R$10","2L - R$15"]);
}, "refri");

etapa=6;
return;
}

if(etapa===6){
pedido.refri = resposta;

botDigitando(()=>{
addMsgComFoto("Forma de pagamento?");
addOpcoes(["Pix","Cartão","Dinheiro"]);
}, "pagamento");

etapa=7;
return;
}

if(etapa===7){
pedido.pagamento = resposta;

if(resposta==="Dinheiro"){
botDigitando(()=>{
addMsgComFoto("Troco para quanto?");
}, "troco");
etapa=8;
}else{
confirmarPedido();
}
return;
}

if(etapa===8){
pedido.troco = resposta;
confirmarPedido();
return;
}

if(etapa===9){

if(resposta.includes("Confirmar")){
finalizar();
}else{
botDigitando(()=>{
addMsgComFoto("Sem problemas! Vamos começar novamente 😊<br>Qual seu nome?");
}, "reiniciar");

etapa=1;
}

return;
}

}

function listaSabores(){
return ["Calabresa","Margherita","Quatro Queijos","Frango com Catupiry","Portuguesa","Pepperoni"];
}

function montarResumoSabores(){

let texto = "";

for(let i=1; i<=pedido.quantidade; i++){
let saboresPizza = pedido.sabores
.filter(s => s.pizza === i)
.map(s => s.sabor);

texto += "🍕 Pizza "+i+": "+saboresPizza.join(" / ")+"<br>";
}

return texto;
}

function confirmarPedido(){

let resumo = "📋 <b>Confirme seu pedido:</b><br><br>";
resumo += "👤 "+pedido.nome+"<br>";
resumo += "📍 "+pedido.endereco+"<br>";
resumo += montarResumoSabores();
resumo += "🥤 "+pedido.refri+"<br>";
resumo += "💳 "+pedido.pagamento+"<br>";

if(pedido.pagamento==="Dinheiro"){
resumo += "💰 Troco: "+pedido.troco+"<br>";
}

botDigitando(()=>{
addMsgComFoto(resumo);
addOpcoes(["✅ Confirmar Pedido","❌ Alterar Pedido"]);
}, "confirmacao");

etapa=9;
}

function finalizar(){

let valorRefri = 0;

if(pedido.refri.includes("10")) valorRefri=10;
if(pedido.refri.includes("15")) valorRefri=15;

let total = (pedido.quantidade * precoPizza) + valorRefri;
pedido.total = total.toFixed(2);

botDigitando(()=>{

addMsgComFoto("✅ Pedido confirmado!<br>Total: R$ "+pedido.total);

let msg = "🍕 *NOVO PEDIDO* %0A%0A";
msg += "*Cliente:* "+pedido.nome+"%0A";
msg += "*Endereço:* "+pedido.endereco+"%0A";

for(let i=1; i<=pedido.quantidade; i++){
let saboresPizza = pedido.sabores
.filter(s => s.pizza === i)
.map(s => s.sabor);

msg += "*Pizza "+i+":* "+saboresPizza.join(" / ")+"%0A";
}

msg += "*Refri:* "+pedido.refri+"%0A";
msg += "*Pagamento:* "+pedido.pagamento+"%0A";

if(pedido.pagamento==="Dinheiro"){
msg += "*Troco:* "+pedido.troco+"%0A";
}

msg += "*Total:* R$ "+pedido.total;

let telefone = "5588993082035";

addMsg('<button onclick="window.open(`https://wa.me/'+telefone+'?text='+msg+'`)">Enviar para WhatsApp</button>');

}, "finalizando");

etapa=0;

}

// 🚀 INÍCIO AUTOMÁTICO
window.onload = function(){

botDigitando(()=>{
addMsgComFoto(`
Olá! 👋 Seja bem-vindo à <b>QueroPizza</b> 🍕<br><br>
🚀 Atendimento rápido e prático<br>
🔥 Pizzas deliciosas saindo agora<br><br>
Me diga seu nome para começarmos seu pedido!
`);
}, "inicio");

etapa = 1;

}

</script>

</body>
</html>
